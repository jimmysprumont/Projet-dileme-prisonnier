run:
  seed: 42
  run_id: null
  data_dir: data

simulation:
  coded_rounds: 200
  ai_rounds: 2
  round_bucket_size: 25
  include_ai: true
  request_timeout_seconds: 90
  history_window: 6
  payoff_matrix:
    CC: [3, 3]
    CD: [0, 5]
    DC: [5, 0]
    DD: [1, 1]

strategies:
  coded:
    - always_cooperate
    - always_defect
    - tit_for_tat
    - random
    - grim_trigger
    - generous_tit_for_tat
  ai_profiles:
    - name: empathic_ai
      prompt_file: agents/empathic_ai.md
    - name: calculator_ai
      prompt_file: agents/calculator_ai.md

vllm:
  enabled: true
  base_url: "http://127.0.0.1:8000/v1"
  model: "HuggingFaceTB/SmolLM2-135M-Instruct"
